<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator - Level 1 Task 3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .calculator {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .display {
            background: #2d3748;
            color: #10b981;
            font-size: 2.5em;
            padding: 30px 25px;
            text-align: right;
            word-wrap: break-word;
            word-break: break-all;
            min-height: 80px;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: #e2e8f0;
            padding: 1px;
        }

        button {
            padding: 25px;
            font-size: 1.4em;
            font-weight: bold;
            border: none;
            cursor: pointer;
            background: white;
            color: #2d3748;
            transition: all 0.2s ease;
        }

        button:active {
            transform: scale(0.95);
        }

        button:hover {
            background: #f7fafc;
        }

        button.number {
            background: #f7fafc;
        }

        button.number:hover {
            background: #edf2f7;
        }

        button.operator {
            background: #667eea;
            color: white;
            font-weight: bold;
        }

        button.operator:hover {
            background: #5568d3;
        }

        button.equals {
            background: #10b981;
            color: white;
            font-weight: bold;
            grid-column: span 2;
        }

        button.equals:hover {
            background: #059669;
        }

        button.clear {
            background: #ef4444;
            color: white;
            font-weight: bold;
            grid-column: span 2;
        }

        button.clear:hover {
            background: #dc2626;
        }

        button.decimal {
            background: #f7fafc;
        }

        button.decimal:hover {
            background: #edf2f7;
        }

        .info {
            background: #f0f4ff;
            border-top: 1px solid #e2e8f0;
            padding: 20px 25px;
            font-size: 0.9em;
            color: #4a5568;
            line-height: 1.6;
        }

        .info h3 {
            color: #667eea;
            margin-bottom: 8px;
        }

        .info ul {
            list-style: none;
            padding-left: 15px;
        }

        .info li {
            margin-bottom: 5px;
        }

        .info li:before {
            content: "✓ ";
            color: #10b981;
            font-weight: bold;
            margin-right: 8px;
        }

        @media (max-width: 600px) {
            .display {
                font-size: 2em;
                min-height: 70px;
            }

            button {
                padding: 20px;
                font-size: 1.2em;
            }

            .header h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="header">
                <h1>Basic Calculator</h1>
                <p>Level 1 Task 3</p>
            </div>

            <div class="display" id="display">0</div>

            <div class="buttons">
                <button class="clear" onclick="clearDisplay()">C</button>
                <button class="operator" onclick="appendOperator('/')">&div;</button>
                <button class="operator" onclick="appendOperator('*')">&times;</button>

                <button class="number" onclick="appendNumber('7')">7</button>
                <button class="number" onclick="appendNumber('8')">8</button>
                <button class="number" onclick="appendNumber('9')">9</button>
                <button class="operator" onclick="appendOperator('-')">-</button>

                <button class="number" onclick="appendNumber('4')">4</button>
                <button class="number" onclick="appendNumber('5')">5</button>
                <button class="number" onclick="appendNumber('6')">6</button>
                <button class="operator" onclick="appendOperator('+')">+</button>

                <button class="number" onclick="appendNumber('1')">1</button>
                <button class="number" onclick="appendNumber('2')">2</button>
                <button class="number" onclick="appendNumber('3')">3</button>
                <button class="decimal" onclick="appendNumber('.')">.</button>

                <button class="number" onclick="appendNumber('0')">0</button>
                <button class="equals" onclick="calculate()">=</button>
            </div>

            <div class="info">
                <h3>Features:</h3>
                <ul>
                    <li>Addition, Subtraction, Multiplication, Division</li>
                    <li>Decimal point support</li>
                    <li>Clear button to reset calculations</li>
                    <li>Real-time display of input</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let currentInput = '0';
        let operator = null;
        let previousValue = null;
        let shouldResetDisplay = false;

        function updateDisplay() {
            display.textContent = currentInput;
        }

        function appendNumber(num) {
            // If the current input is '0', replace it with the new number
            if (currentInput === '0' && num !== '.') {
                currentInput = num;
            } else if (num === '.') {
                // Prevent multiple decimals
                if (!currentInput.includes('.')) {
                    currentInput += num;
                }
            } else {
                currentInput += num;
            }

            shouldResetDisplay = false;
            updateDisplay();
        }

        function appendOperator(op) {
            if (previousValue === null) {
                previousValue = currentInput;
            } else if (!shouldResetDisplay) {
                // Perform calculation for chain operations
                calculate();
                previousValue = currentInput;
            }

            operator = op;
            shouldResetDisplay = true;
            updateDisplay();
        }

        function calculate() {
            if (operator === null || previousValue === null) {
                return;
            }

            let result;
            const prev = parseFloat(previousValue);
            const current = parseFloat(currentInput);

            switch (operator) {
                case '+':
                    result = prev + current;
                    break;
                case '-':
                    result = prev - current;
                    break;
                case '*':
                    result = prev * current;
                    break;
                case '/':
                    if (current === 0) {
                        alert('Cannot divide by zero!');
                        clearDisplay();
                        return;
                    }
                    result = prev / current;
                    break;
                default:
                    return;
            }

            // Round to avoid floating point errors
            result = Math.round(result * 100000000) / 100000000;

            currentInput = result.toString();
            operator = null;
            previousValue = null;
            shouldResetDisplay = true;
            updateDisplay();
        }

        function clearDisplay() {
            currentInput = '0';
            operator = null;
            previousValue = null;
            shouldResetDisplay = false;
            updateDisplay();
        }

        // Initialize display
        updateDisplay();
    </script>
</body>
</html>
