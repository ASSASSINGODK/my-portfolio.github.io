<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>♾️Anime</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Animated gradient background */
    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite;
      font-family: 'Segoe UI', 'Arial', sans-serif;
    }
    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .container {
      background: rgba(255, 255, 255, 0.18);
      box-shadow: 0 8px 32px 0 rgba( 31, 38, 135, 0.37 );
      backdrop-filter: blur(9px);
      -webkit-backdrop-filter: blur(9px);
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 40px 32px 32px 32px;
      width: 95%;
      max-width: 400px;
      text-align: center;
    }

    .anime-logo {
      font-size: 3.5rem;
      margin-bottom: 10px;
      color: #fff;
      text-shadow: 1px 1px 10px #0006;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 1.2rem;
      margin-bottom: 30px;
      color: #faf2fa;
      opacity: .85;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      margin: 18px 0;
      font-size: 1.1rem;
    }
    a {
      padding: 10px 25px;
      border-radius: 16px;
      transition: all 0.22s cubic-bezier(.12,.79,.92,.47);
      background: linear-gradient(to right, #00c6fb 0%, #005bea 100%);
      color: #fff7fa;
      font-weight: 600;
      letter-spacing: 1px;
      text-decoration: none;
      box-shadow: 0 3px 12px #1f36493b;
      border: none;
      outline: none;
      display: inline-block;
      cursor: pointer;
    }
    a:hover, a:focus {
      background: linear-gradient(to right, #005bea 0%, #00c6fb 100%);
      box-shadow: 0 8px 24px #19395035;
      color: #fff;
      transform: scale(1.07);
    }

    @media (max-width: 500px) {
      .container {
        padding: 25px 5vw 18px 5vw;
      }
      .anime-logo {
        font-size: 2.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="anime-logo">♾️Anime</div>
    <div class="subtitle">Your portal to worlds of adventure, action, and fun</div>
    <ul>
      <li><a href="Assassingodk.html">Home</a></li>
      <li><a href="page2.html">Anime</a></li>
      <!-- Add more as you want -->
    </ul>
  </div>
  <script>
  // Add favorites heart to anime cards
  (function(){
    function loadFavorites(){
      try{ return JSON.parse(localStorage.getItem('favorites')||'[]'); }catch(e){ return []; }
    }
    function saveFavorites(list){ localStorage.setItem('favorites', JSON.stringify(list||[])); }
    function isFavorited(url){ const list = loadFavorites(); return !!list.find(f=>f.url === url); }
    
    document.addEventListener('DOMContentLoaded', function(){
      document.querySelectorAll('.anime-card').forEach(card=>{
        if(card.querySelector('.card-fav')) return;
        const link = card.querySelector('a[href]');
        if(!link) return;
        const url = link.getAttribute('href');
        const h = card.querySelector('h3');
        const title = h ? h.textContent.trim() : url;
        
        const btn = document.createElement('button');
        btn.className = isFavorited(url) ? 'card-fav' : 'card-fav not-fav';
        btn.innerHTML = '<i class="' + (isFavorited(url) ? 'fas' : 'far') + ' fa-heart"></i>';
        btn.style.cssText = 'position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.5);border:none;padding:6px;border-radius:8px;cursor:pointer;z-index:50;';
        
        btn.addEventListener('click', function(e){
          e.preventDefault(); 
          e.stopPropagation();
          const list = loadFavorites();
          const idx = list.findIndex(f=>f.url===url);
          if(idx>=0){
            list.splice(idx, 1);
            btn.classList.add('not-fav');
            btn.innerHTML = '<i class="far fa-heart"></i>';
          } else {
            list.unshift({ title, url });
            btn.classList.remove('not-fav');
            btn.innerHTML = '<i class="fas fa-heart"></i>';
          }
          saveFavorites(list);
        });
        
        card.style.position = 'relative';
        card.insertBefore(btn, card.firstChild);
      });
    });
  })();
  </script>
</body>
</html>
