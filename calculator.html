<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator - Level 1 Task 3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .calculator {
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 350px;
        }

        .display {
            background: #e0f2fe;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            text-align: right;
            font-size: 2.5em;
            font-weight: bold;
            color: #1e40af;
            word-wrap: break-word;
            word-break: break-all;
            min-height: 70px;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            padding: 20px;
            font-size: 1.5em;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
        }

        button.number {
            background: #1e40af;
            grid-column: span 1;
        }

        button.number:hover {
            background: #1d3a8a;
            transform: scale(1.05);
        }

        button.number:active {
            transform: scale(0.95);
        }

        button.operator {
            background: #0284c7;
            font-size: 1.3em;
        }

        button.operator:hover {
            background: #0369a1;
            transform: scale(1.05);
        }

        button.operator:active {
            transform: scale(0.95);
        }

        button.equals {
            background: #0284c7;
            grid-column: span 1;
        }

        button.equals:hover {
            background: #0369a1;
            transform: scale(1.05);
        }

        button.equals:active {
            transform: scale(0.95);
        }

        button.clear {
            background: #1e40af;
            grid-column: span 1;
            font-size: 1.2em;
        }

        button.clear:hover {
            background: #1d3a8a;
            transform: scale(1.05);
        }

        button.clear:active {
            transform: scale(0.95);
        }

        @media (max-width: 400px) {
            .calculator {
                padding: 20px;
            }

            .display {
                font-size: 2em;
                padding: 20px;
            }

            button {
                padding: 15px;
                font-size: 1.3em;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="appendOperator('/')">÷</button>
            <button class="operator" onclick="appendOperator('*')">×</button>
            <button class="operator" onclick="deleteLast()">←</button>

            <button class="number" onclick="appendNumber('7')">7</button>
            <button class="number" onclick="appendNumber('8')">8</button>
            <button class="number" onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('-')">−</button>

            <button class="number" onclick="appendNumber('4')">4</button>
            <button class="number" onclick="appendNumber('5')">5</button>
            <button class="number" onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOperator('+')">+</button>

            <button class="number" onclick="appendNumber('1')">1</button>
            <button class="number" onclick="appendNumber('2')">2</button>
            <button class="number" onclick="appendNumber('3')">3</button>
            <button class="equals" onclick="calculate()">=</button>

            <button class="number" style="grid-column: span 2;" onclick="appendNumber('0')">0</button>
            <button class="number" onclick="appendNumber('.')">.</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let currentInput = '0';
        let operator = null;
        let previousValue = null;
        let shouldResetDisplay = false;

        function updateDisplay() {
            display.textContent = currentInput || '0';
        }

        function appendNumber(num) {
            if (shouldResetDisplay) {
                currentInput = num;
                shouldResetDisplay = false;
            } else if (currentInput === '0' && num !== '.') {
                currentInput = num;
            } else if (num === '.') {
                if (!currentInput.includes('.')) {
                    currentInput += num;
                }
            } else {
                currentInput += num;
            }
            updateDisplay();
        }

        function appendOperator(op) {
            if (currentInput === '') return;
            
            if (previousValue === null) {
                previousValue = currentInput;
            } else if (!shouldResetDisplay) {
                calculate();
                previousValue = currentInput;
            }

            operator = op;
            shouldResetDisplay = true;
        }

        function calculate() {
            if (operator === null || previousValue === null || currentInput === '') {
                return;
            }

            let result;
            const prev = parseFloat(previousValue);
            const current = parseFloat(currentInput);

            switch (operator) {
                case '+':
                    result = prev + current;
                    break;
                case '-':
                    result = prev - current;
                    break;
                case '*':
                    result = prev * current;
                    break;
                case '/':
                    if (current === 0) {
                        alert('Cannot divide by zero!');
                        clearDisplay();
                        return;
                    }
                    result = prev / current;
                    break;
                default:
                    return;
            }

            result = Math.round(result * 100000000) / 100000000;
            currentInput = result.toString();
            operator = null;
            previousValue = null;
            shouldResetDisplay = true;
            updateDisplay();
        }

        function clearDisplay() {
            currentInput = '0';
            operator = null;
            previousValue = null;
            shouldResetDisplay = false;
            updateDisplay();
        }

        function deleteLast() {
            if (currentInput && currentInput !== '0') {
                currentInput = currentInput.slice(0, -1) || '0';
                updateDisplay();
            }
        }

        updateDisplay();

        // Keyboard Support
        document.addEventListener('keydown', function(e) {
            const key = e.key;

            // Number keys (0-9)
            if (key >= '0' && key <= '9') {
                appendNumber(key);
                e.preventDefault();
            }
            // Decimal point
            else if (key === '.') {
                appendNumber('.');
                e.preventDefault();
            }
            // Operators
            else if (key === '+') {
                appendOperator('+');
                e.preventDefault();
            }
            else if (key === '-') {
                appendOperator('-');
                e.preventDefault();
            }
            else if (key === '*') {
                appendOperator('*');
                e.preventDefault();
            }
            else if (key === '/' || key === 'Divide') {
                appendOperator('/');
                e.preventDefault();
            }
            // Equals (Enter or =)
            else if (key === 'Enter' || key === '=') {
                calculate();
                e.preventDefault();
            }
            // Clear (Escape or C)
            else if (key === 'Escape' || key.toLowerCase() === 'c') {
                clearDisplay();
                e.preventDefault();
            }
            // Delete (Backspace)
            else if (key === 'Backspace') {
                deleteLast();
                e.preventDefault();
            }
        });
</body>
</html>
